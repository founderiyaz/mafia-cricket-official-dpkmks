<style>
body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #022c22, #010b07);
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1rem;
}

/* BACKGROUND BLUR LOGO EFFECT */
.bg-blur{
  position:absolute;
  width:500px;
  height:500px;
  background:url('https://telegram-ads.riyazshaikh.com/wp-content/uploads/2025/07/badshah-ff.jpg') center/cover;
  opacity:0.05;
  filter:blur(30px);
  z-index:0;
}

/* MAIN CARD */
.card{
  position:relative;
  z-index:1;
  background:linear-gradient(180deg,#064e3b,#022c22);
  border-radius:22px;
  padding:2rem;
  max-width:420px;
  width:100%;
  text-align:center;
  box-shadow:0 0 40px rgba(0,255,150,0.2);
  border:1px solid rgba(0,255,150,0.2);
}

/* PROFILE GLOW */
.profile{
  width:110px;
  height:110px;
  margin:auto;
  border-radius:50%;
  padding:4px;
  background:radial-gradient(circle,#00ffae,#065f46);
  box-shadow:0 0 20px #00ffae;
}

.profile img{
  width:100%;
  height:100%;
  border-radius:50%;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:800;
  color:#d1fae5;
  margin-top:12px;
}

/* SUB */
.sub{
  font-size:13px;
  color:#a7f3d0;
}

/* STATS */
.stats{
  display:flex;
  gap:10px;
  margin:16px 0;
}

.stat{
  flex:1;
  border:1px solid rgba(0,255,150,0.4);
  border-radius:12px;
  padding:10px;
  color:#d1fae5;
}

.stat b{
  font-size:18px;
}

/* ICON ROW */
.icons{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
  color:#a7f3d0;
  font-size:12px;
}

/* CTA */
.btn-telegram{
  display:flex;
  opacity:0.01;
  transform:translateY(12px);
  transition:0.6s;

  align-items:center;
  justify-content:center;
  padding:16px;
  border-radius:14px;
  font-weight:700;
  color:black;
  background:linear-gradient(90deg,#d9f99d,#84cc16);
  width:100%;
  margin-top:20px;
  box-shadow:0 0 20px #84cc16;
}
</style>

</head>

<body>

<div class="bg-blur"></div>

<div class="card">

  <!-- PROFILE -->
  <div class="profile">
    <img src="https://telegram-ads.riyazshaikh.com/wp-content/uploads/2026/03/ckt-logo.jpg">

  <!-- MEMBERS -->
  <div class="text-green-300 text-sm mt-2">44K+ Active Members</div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat"><b>26,873</b><br>Signals</div>
    <div class="stat"><b>99%</b><br>Accuracy</div>
    <div class="stat"><b>4.9★</b><br>Rating</div>
  </div>

  <!-- ICONS -->
  <div class="icons">
    <div>✔ Verified</div>
    <div>🔒 Secure</div>
    <div>📈 Profitable</div>
    <div>⭐ Top Rated</div>
  </div>

  <!-- CTA -->
  <a id="tgBtn"
     href="https://t.me/+CDYrcvFEdt81Njg1"
     target="_blank"
     class="btn-telegram">
     🚀 Join Free Telegram Channel
  </a>

  <!-- FOOTER -->
  <div class="text-xs text-green-200 mt-4">
    © 2026 • Market Education
  </div>

</div>

<script>
setTimeout(()=>{
  const btn=document.getElementById("tgBtn");
